# render.yaml — deploy both services to Render
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Backend (FastAPI RAG API) ─────────────────────────────────────────
  - type: web
    name: nnrg-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free          # change to starter/standard for production
    envVars:
      - key: GROQ_API_KEY
        sync: false     # you will enter this manually in the Render dashboard
      - key: ADMIN_API_KEY
        value: nnrg_admin_2024   # change this!
      - key: VECTOR_STORE_BACKEND
        value: faiss
    disk:
      name: nnrg-data
      mountPath: /app
      sizeGB: 1         # persists uploads/ and vectorstore/ across deploys

  # ── Frontend (React + Vite → nginx) ──────────────────────────────────
  - type: web
    name: nnrg-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    buildArgs:
      # Replace with your actual backend URL after first backend deploy:
      # e.g. https://nnrg-backend.onrender.com
      VITE_BACKEND_URL: https://nnrg-backend.onrender.com
