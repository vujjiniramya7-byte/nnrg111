version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-nnrg_admin_2024}
      - VECTOR_STORE_BACKEND=faiss
    volumes:
      - nnrg_uploads:/app/uploads
      - nnrg_vectorstore:/app/vectorstore
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # For local docker-compose, backend is at localhost:8000
        VITE_BACKEND_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  nnrg_uploads:
  nnrg_vectorstore:
